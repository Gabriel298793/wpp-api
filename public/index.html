<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WPP — Conectar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: #25d366;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    h1 {
      font-size: 17px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.3px;
    }

    .subtitle {
      font-size: 13px;
      color: #555;
    }

    label {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      display: block;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid #242424;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e5e5e5;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #383838; }

    .field { display: flex; flex-direction: column; }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: -0.1px;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-primary { background: #25d366; color: #000; }
    .btn-danger { background: #1a1a1a; color: #ef4444; border: 1px solid #2a1a1a; }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-radius: 8px;
      background: #0f0f0f;
      border: 1px solid #1c1c1c;
      font-size: 13px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot.idle  { background: #333; }
    .dot.qr    { background: #f59e0b; animation: pulse 1.1s infinite; }
    .dot.open  { background: #25d366; }
    .dot.error { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    .status-label { color: #888; }
    .status-label b { color: #ddd; font-weight: 500; }

    .qr-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .qr-wrap.visible { display: flex; }

    .qr-wrap img {
      width: 210px;
      height: 210px;
      border-radius: 10px;
      background: #fff;
      padding: 8px;
    }

    .qr-hint {
      font-size: 12px;
      color: #555;
      text-align: center;
      line-height: 1.6;
    }

    .divider {
      height: 1px;
      background: #1c1c1c;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">💬</div>
      <div>
        <h1>WhatsApp Connect</h1>
        <div class="subtitle">Gera QR e envia pro n8n</div>
      </div>
    </div>

    <div class="field">
      <label>Nome da instância</label>
      <input id="instanceName" type="text" value="n8n" placeholder="ex: n8n" />
    </div>

    <div class="status-bar">
      <div class="dot idle" id="dot"></div>
      <div class="status-label" id="statusText"><b>Aguardando</b></div>
    </div>

    <button class="btn-primary" id="btnConnect" onclick="connect()">Gerar QR Code</button>

    <div class="qr-wrap" id="qrWrap">
      <img id="qrImg" src="" alt="QR Code" />
      <p class="qr-hint">Abra o WhatsApp → Aparelhos conectados<br>→ Conectar um aparelho</p>
    </div>

    <div class="divider" id="divider" style="display:none"></div>
    <button class="btn-danger" id="btnDisconnect" onclick="disconnect()" style="display:none">Desconectar instância</button>
  </div>

  <script>
    const API_KEY = 'PH9e2DFBUCiEaQ3SWgohGLupjsnkAv1f'
    const WEBHOOK = 'https://n8n-stack-n8n.29xxar.easypanel.host/webhook/QR_CODE_TESTE'

    let pollTimer = null

    const instance = () => document.getElementById('instanceName').value.trim() || 'n8n'
    const h = () => ({ 'Content-Type': 'application/json', 'apikey': API_KEY })

    function setStatus(state, label) {
      document.getElementById('dot').className = 'dot ' + state
      document.getElementById('statusText').innerHTML = '<b>' + label + '</b>'
    }

    function showQR(base64) {
      document.getElementById('qrImg').src = base64
      document.getElementById('qrWrap').classList.add('visible')
    }

    function hideQR() {
      document.getElementById('qrWrap').classList.remove('visible')
      document.getElementById('qrImg').src = ''
    }

    function stopPoll() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null }
    }

    async function connect() {
      const name = instance()
      stopPoll()
      setStatus('qr', 'Criando instância...')
      document.getElementById('btnConnect').disabled = true

      try {
        await fetch('/instance/create', {
          method: 'POST',
          headers: h(),
          body: JSON.stringify({ instanceName: name, webhook: WEBHOOK })
        })
      } catch (_) {}

      pollTimer = setInterval(() => poll(name), 2500)
      poll(name)
    }

    async function poll(name) {
      try {
        const r = await fetch(`/instance/connect/${name}`, { headers: h() })
        const data = await r.json()

        if (data.status === 'open') {
          stopPoll()
          hideQR()
          setStatus('open', 'Conectado ✓')
          document.getElementById('btnConnect').disabled = false
          document.getElementById('btnDisconnect').style.display = 'block'
          document.getElementById('divider').style.display = 'block'
          return
        }

        if (data.qrcode?.base64) {
          showQR(data.qrcode.base64)
          setStatus('qr', 'Escaneie o QR Code...')
        } else {
          setStatus('qr', 'Conectando...')
        }
      } catch {
        setStatus('error', 'Erro de conexão')
        stopPoll()
        document.getElementById('btnConnect').disabled = false
      }
    }

    async function disconnect() {
      stopPoll()
      const name = instance()
      try {
        await fetch(`/instance/delete/${name}`, { method: 'DELETE', headers: h() })
      } catch (_) {}
      hideQR()
      setStatus('idle', 'Desconectado')
      document.getElementById('btnConnect').disabled = false
      document.getElementById('btnDisconnect').style.display = 'none'
      document.getElementById('divider').style.display = 'none'
    }

    window.addEventListener('load', async () => {
      try {
        const r = await fetch(`/instance/connectionState/${instance()}`, { headers: h() })
        if (r.ok) {
          const data = await r.json()
          if (data.state === 'open') {
            setStatus('open', 'Já conectado ✓')
            document.getElementById('btnDisconnect').style.display = 'block'
            document.getElementById('divider').style.display = 'block'
          }
        }
      } catch (_) {}
    })
  </script>
</body>
</html>
